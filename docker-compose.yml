services:
  postgres:
    # Official pgvector image to support AI embeddings
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rag_chatbot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    # Lightweight Redis image for BullMQ queues
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: